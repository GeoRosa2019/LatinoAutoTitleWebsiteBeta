<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us - Latino Auto Title.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Latino Auto Title</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="license-plates.html">License Plates</a></li>
          <li class="nav-item"><a class="nav-link" href="insurance.html">Auto Insurance</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">Contact Us</h2>
      <p class="text-center text-muted mb-5">Have questions? Reach out and we'll respond as soon as possible.</p>

      <div class="row justify-content-center">
        <div class="col-md-8">
        <!-- Contact Form (Formcarry Integration) -->
        <form id="contactForm" action="https://formcarry.com/s/YOUR_FORM_ID" method="POST" accept-charset="UTF-8">
        
        <!-- Honeypot for spam bots -->
        <input type="text" name="_gotcha" style="display:none">

        <!-- Full Name -->
        <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input 
            type="text" 
            class="form-control" 
            id="name" 
            name="name" 
            placeholder="John Doe" 
            required
            >
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input 
            type="email" 
            class="form-control" 
            id="email" 
            name="email" 
            placeholder="john@example.com" 
            required
            >
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input 
            type="tel" 
            class="form-control" 
            id="phone" 
            name="phone" 
            placeholder="(555) 123-4567"
            >
        </div>

        <!-- Message -->
        <div class="mb-3">
            <label for="message" class="form-label">Your Message</label>
            <textarea 
            class="form-control" 
            id="message" 
            name="message" 
            rows="5" 
            placeholder="Type your message here..."
            required
            ></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
        </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification (Hidden Initially) -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="formToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">
          ✅ Message sent! We'll get back to you soon.
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
    <div class="container">
      <p>&copy; 2025 Latino Auto Title. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
